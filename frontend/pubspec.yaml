name: nextgen
description: "NextGen Universal E-Commerce Platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # ── UI ────────────────────────────────────────
  cupertino_icons: ^1.0.8
  gap: ^3.0.1
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  cached_network_image: ^3.4.1

  # ── State Management ─────────────────────────
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.7

  # ── Navigation ───────────────────────────────
  go_router: ^14.6.2

  # ── Network ──────────────────────────────────
  dio: ^5.4.3
  flutter_secure_storage: ^9.2.4

  # ── DI ───────────────────────────────────────
  get_it: ^8.0.3

  # ── Utilities ────────────────────────────────
  logger: ^2.5.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Outfit
      fonts:
        - asset: fonts/Outfit-Regular.ttf
          weight: 400
        - asset: fonts/Outfit-Medium.ttf
          weight: 500
        - asset: fonts/Outfit-SemiBold.ttf
          weight: 600
        - asset: fonts/Outfit-Bold.ttf
          weight: 700
        - asset: fonts/Outfit-ExtraBold.ttf
          weight: 800
